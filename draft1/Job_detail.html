<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JobTrack — Google Software Engineer Intern</title>

  <!-- Bootstrap 5 (loaded first so our own rules can override) -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

  <!-- Our custom stylesheet (loaded last so it wins the cascade) -->
  <link rel="stylesheet" href="css/job_detail.css">
</head>
<body>

  <div class="page-wrapper">
    <div class="app-frame">
      <div class="row g-0">

        <!-- ===== Sidebar ===== -->
        <aside class="col-12 col-md-3 col-lg-2 sidebar">
          <h2 class="brand">JobTrack</h2>
          <nav>
            <ul class="nav-list">
              <li><a href="#" class="nav-link-item">Dashboard</a></li>
              <li><a href="#" class="nav-link-item">Job Board</a></li>
              <li><a href="Applications.html" class="nav-link-item active">Applications</a></li>
              <li><a href="Analytics.html" class="nav-link-item">Analytics</a></li>
              <li><a href="#" class="nav-link-item">Settings</a></li>
            </ul>
          </nav>
        </aside>

        <!-- ===== Main content ===== -->
        <main class="col-12 col-md-9 col-lg-10 main-content">

          <div class="row g-4">

            <!-- ===== Left panel: Job details ===== -->
            <section class="col-12 col-lg-6">
              <article class="panel">
                <p class="job-company">Google</p>
                <h1 class="job-role">Software Engineer Intern</h1>

                <ul class="job-meta">
                  <li><strong>Salary:</strong> $50–60/hr</li>
                  <li><strong>Location:</strong> Seattle, WA</li>
                  <li><strong>Deadline:</strong> May 15, 2025</li>
                  <li><strong>Source:</strong> LinkedIn</li>
                </ul>

                <div class="job-description" aria-label="Job description">
                  Job description text goes here...
                </div>

                <a href="#" class="btn-link">View on LinkedIn →</a>
              </article>
            </section>

            <!-- ===== Right panel: Workspace ===== -->
            <section class="col-12 col-lg-6">
              <article class="panel">
                <h2 class="workspace-title">Workspace</h2>

                <!-- Status pills -->
                <h3 class="subsection-title">Status</h3>
                <div class="status-group">
                  <button type="button" class="status-pill">Saved</button>
                  <button type="button" class="status-pill">Applied</button>
                  <button type="button" class="status-pill active">Interview</button>
                  <button type="button" class="status-pill">Offer</button>
                </div>

                <!-- Notes -->
                <h3 class="subsection-title">Notes</h3>
                <textarea class="notes-area"
                          placeholder="Write your notes here..."></textarea>
                <div class="save-row">
                  <button type="button" class="btn-save">Save Note</button>
                </div>

                <!-- Tasks -->
                <h3 class="subsection-title">Tasks</h3>
                <ul class="task-list">
                  <li>
                    <label>
                      <input type="checkbox"> Send thank-you email
                    </label>
                  </li>
                  <li>
                    <label>
                      <input type="checkbox"> Coding challenge
                    </label>
                  </li>
                  <li>
                    <label>
                      <input type="checkbox" checked> Mock interview prep
                    </label>
                  </li>
                </ul>

                <button type="button" class="btn-add-task">+ Add Task</button>
              </article>
            </section>

          </div>

        </main>
      </div>
    </div>
  </div>

</body>
</html>
