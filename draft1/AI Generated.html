<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>JobTrack - Job Board</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <h2>JobTrack</h2>
      <nav>
        <a href="#">Dashboard</a>
        <a class="active" href="job-search.html">Job Board</a>
        <a href="applications.html">Applications</a>
        <a href="#">Analytics</a>
        <a href="#">Settings</a>
      </nav>

      <div class="filters">
        <h3>Filters</h3>

        <label>Location</label>
        <select>
          <option>Select...</option>
          <option>Seattle</option>
          <option>Remote</option>
          <option>New York</option>
        </select>

        <label>Salary</label>
        <select>
          <option>$60K - $200K</option>
          <option>$80K - $120K</option>
          <option>$120K+</option>
        </select>

        <label>Experience</label>
        <select>
          <option>Select...</option>
          <option>Internship</option>
          <option>Entry Level</option>
        </select>

        <label>Visa Sponsor</label>
        <select>
          <option>H-1B</option>
          <option>OPT</option>
          <option>No sponsor</option>
        </select>

        <button>Apply Filters</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="search-header">
        <input type="text" placeholder="Search job title, company...">
        <button>Search</button>
      </div>

      <p class="result-count">284 jobs found</p>

      <section class="job-grid">
        <div class="job-card">
          <h3>Google - SWE Intern</h3>
          <p>Seattle · Remote · $50/hr</p>
          <button>Apply</button>
          <button>Save</button>
        </div>

        <div class="job-card">
          <h3>Stripe - Frontend Eng</h3>
          <p>SF, CA · $140k+</p>
          <button>Apply</button>
          <button>Save</button>
        </div>

        <div class="job-card">
          <h3>Airbnb - Designer</h3>
          <p>Remote · $120k</p>
          <button>Apply</button>
          <button>Save</button>
        </div>

        <div class="job-card">
          <h3>Meta - Data Analyst</h3>
          <p>Menlo Park · $45/hr</p>
          <button>Apply</button>
          <button>Save</button>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
